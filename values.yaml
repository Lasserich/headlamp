# ── Headlamp chart values ─────────────────────────────────────────────────────
# All values are passed through to the headlamp subchart.
# Run `helm dependency update .` once before the first install.

headlamp:
  config:
    pluginsDir: "/headlamp/plugins"
    extraArgs:
      - "-user-plugins-dir=/headlamp/user-plugins"
      - "-watch-plugins-changes=true"
      # Enable stateless dynamic clusters — kubeconfig is stored in the
      # browser's IndexedDB and sent as a KUBECONFIG header on every request.
      # The parent UI injects the kubeconfig via the iframe-bridge plugin.
      - "-enable-dynamic-clusters"
      # OIDC — Headlamp handles the OIDC flow itself using the auth-provider
      # config embedded in the kubeconfig received from the parent UI.
      # Update client-id, issuer-url and callback-url per environment.
      - "-oidc-client-id=becae227-4b3d-4531-9cac-2d8f52349be9"
      - "-oidc-idp-issuer-url=https://openmcp.accounts.ondemand.com"
      - "-oidc-use-pkce"
      - "-oidc-callback-url=http://localhost:8080/oidc-callback"

  # ── iframe-bridge plugin (custom, built locally) ───────────────────────────
  # ── kiosk-plugin (built via scripts/build-kiosk-plugin.sh) ─────────────────
  # TODO: Once headlamp-plugin-kiosk is published to ArtifactHub / npm, replace
  #       the ConfigMap approach below with a pluginsManager entry (same pattern
  #       as headlamp-flux above) and remove configmap-kiosk-plugin.yaml.
  volumes:
    - name: iframe-bridge-plugin
      configMap:
        name: iframe-bridge-plugin
    - name: kiosk-plugin
      configMap:
        name: kiosk-plugin

  volumeMounts:
    - name: iframe-bridge-plugin
      mountPath: /headlamp/user-plugins/iframe-bridge
      readOnly: true
    - name: kiosk-plugin
      mountPath: /headlamp/user-plugins/kiosk-plugin
      readOnly: true

  # ── Remote plugins installed by the pluginsManager init container ──────────
  pluginsManager:
    enabled: true
    baseImage: node:lts-alpine
    configContent: |
      plugins:
        - name: headlamp-flux
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
